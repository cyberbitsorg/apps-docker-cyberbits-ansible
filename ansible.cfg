[defaults]
inventory = inventory/
roles_path = ./roles
remote_user = admin
private_key_file = ~/.ssh/id_ed25519
host_key_checking = True
retry_files_enabled = False
interpreter_python = /usr/bin/python3
deprecation_warnings = False

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
